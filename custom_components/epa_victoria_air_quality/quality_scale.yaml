rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration does not expose integration actions/services.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      This integration does not expose integration actions/services.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: todo
  entity-event-setup:
    status: exempt
    comment: |
      Entity events are not used by this integration.
  entity-unique-id: done
  has-entity-name:
    status: exempt
    comment: |
      Existing entities intentionally preserve legacy naming behavior.
      Converting to has_entity_name would rename long-standing entities.
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      This integration does not expose integration actions/services.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: |
      This is a cloud API integration; local discovery is not used.
  discovery:
    status: exempt
    comment: |
      This is a cloud API integration; local discovery is not used.
  docs-data-update: done
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices:
    status: exempt
    comment: |
      This integration uses a cloud API and does not integrate local devices.
  docs-supported-functions: done
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: |
      Each config entry maps to one fixed EPA site device; dynamic device
      enumeration/removal does not apply.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: todo
    comment: |
      A reconfiguration flow is not implemented becase it is identical to an options flow.
  repair-issues: done
  stale-devices:
    status: exempt
    comment: |
      Each config entry manages one fixed site device.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: todo
    comment: |
      This project is maintained as a custom integration.
      Strict typing is adhered to, and is expected for any new code contributions.
